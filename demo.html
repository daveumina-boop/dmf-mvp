<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DMF Demo</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.video-container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Top left branding */
.logo-overlay {
  position: absolute;
  top: 16px;
  left: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 20;
  padding: 6px 10px;
  border-radius: 12px;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.2);
}

.logo-overlay img {
  height: 40px;
  width: 40px;
  border-radius: 10px;
}

.logo-overlay span {
  color: #fff;
  font-weight: 800;
  font-size: 14px;
}

/* RIGHT SIDE */
.side-actions {
  position: absolute;
  right: 12px;
  bottom: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  z-index: 20;
}

/* PROFILE */
.profile {
  position: relative;
}

.profile img {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 2px solid #fff;
}

.follow {
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  background: #e01919;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 14px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

/* ACTION BUTTONS */
.action {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
}

.action-btn {
  width: 50px;
  height: 50px;
  border-radius: 999px;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  backdrop-filter: blur(6px);
}

/* Bottom info */
.bottom-info {
  position: absolute;
  left: 16px;
  right: 80px;
  bottom: 110px;
  color: white;
  z-index: 20;
}

.bottom-info .restaurant {
  font-weight: 800;
  font-size: 18px;
  margin-bottom: 6px;
}

.bottom-info .description {
  font-size: 13px;
  color: #ddd;
}

/* Order button */
.order-btn {
  position: absolute;
  bottom: 20px;
  left: 16px;
  right: 16px;
  background: #e01919;
  color: white;
  padding: 16px;
  border-radius: 14px;
  font-weight: 800;
  font-size: 18px;
  text-align: center;
  text-decoration: none;
  box-shadow: 0 10px 30px rgba(224,25,25,0.5);
  z-index: 20;
}

/* Fade */
.bottom-fade {
  position: absolute;
  bottom: 0;
  height: 40%;
  width: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
}
</style>
</head>

<body>

<div class="video-container">

  <video autoplay muted loop playsinline>
    <source src="demo-video.mp4" type="video/mp4">
  </video>

  <div class="bottom-fade"></div>

  <!-- Top left -->
  <div class="logo-overlay">
    <img src="bbq-logo.png">
    <span>Real Smoq'ed BBQ</span>
  </div>

  <!-- RIGHT SIDE -->
  <div class="side-actions">

    <!-- PROFILE -->
    <div class="profile">
      <img src="bbq-logo.png">
      <div class="follow">+</div>
    </div>

    <div class="action">
      <div class="action-btn">❤️</div>
      <div>1.2K</div>
    </div>

    <div class="action">
      <div class="action-btn">💬</div>
      <div>184</div>
    </div>

    <div class="action">
      <div class="action-btn">🔖</div>
      <div>Save</div>
    </div>

    <div class="action">
      <div class="action-btn">↗️</div>
      <div>Share</div>
    </div>

  </div>

  <!-- Bottom -->
  <div class="bottom-info">
    <div class="restaurant">Real Smoq'ed BBQ</div>
    <div class="description">
      Slow-smoked BBQ, sauced ribs, and real comfort food.
    </div>
  </div>

  <a href="./restaurant.html" class="order-btn">Order Now</a>

</div>

</body>
</html>
