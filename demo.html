<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMF Demo</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .logo-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .logo-overlay img {
      height: 52px;
      width: auto;
      display: block;
      box-shadow: 0 6px 16px rgba(0,0,0,0.55);
    }

    .logo-overlay span {
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .order-btn {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(90deg, #ff2a2a 0%, #c00000 100%);
      color: #fff;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(180,0,0,0.35);
      z-index: 10;
    }

    @media (max-width: 600px) {
      .logo-overlay {
        top: 16px;
        left: 16px;
      }

      .logo-overlay img {
        height: 44px;
      }

      .logo-overlay span {
        font-size: 13px;
      }

      .order-btn {
        width: calc(100% - 32px);
        text-align: center;
        bottom: 20px;
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <div class="video-container">
    <video autoplay muted loop playsinline>
      <source src="demo-video.mp4" type="video/mp4" />
    </video>

    <div class="logo-overlay">
      <img src="bbq-logo.png" alt="Restaurant Logo" />
      <span>Real Smoq'ed BBQ</span>
    </div>

    <a href="./restaurant.html" class="order-btn">Order Now</a>
  </div>

</body>
</html>
