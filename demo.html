<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMF Demo</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Top left restaurant branding */
    .logo-overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 20;
      padding: 8px 12px;
      border-radius: 16px;
      backdrop-filter: blur(8px);
      background: rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .logo-overlay img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      object-fit: cover;
      object-position: center;
      transform: scale(1.3);
      display: block;
      box-shadow: 0 6px 16px rgba(0,0,0,0.55);
    }

    .logo-overlay span {
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      white-space: nowrap;
    }

    /* Right side TikTok actions */
    .side-actions {
      position: absolute;
      right: 12px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 20;
    }

    .profile {
      position: relative;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      background: rgba(0,0,0,0.2);
    }

    .profile img {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.4);
      display: block;
    }

    .follow {
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      background: #e01919;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 14px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }

    .action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      text-decoration: none;
    }

    .action-btn {
      width: 50px;
      height: 50px;
      border-radius: 999px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      line-height: 1;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    /* Bottom info */
    .bottom-info {
      position: absolute;
      left: 16px;
      right: 80px;
      bottom: 110px;
      color: #fff;
      z-index: 20;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    .bottom-info .restaurant {
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .bottom-info .description {
      font-size: 13px;
      color: #ddd;
      line-height: 1.4;
      max-width: 420px;
    }

    /* Order button */
    .order-btn {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: #e01919;
      color: #fff;
      padding: 16px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 18px;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(224,25,25,0.5);
      z-index: 20;
    }

    /* Bottom fade for readability */
    .bottom-fade {
      position: absolute;
      bottom: 0;
      height: 40%;
      width: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
      z-index: 10;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .logo-overlay {
        top: 16px;
        left: 16px;
        padding: 8px 10px;
      }

      .logo-overlay img {
        width: 40px;
        height: 40px;
      }

      .logo-overlay span {
        font-size: 13px;
      }

      .side-actions {
        right: 10px;
        bottom: 118px;
        gap: 16px;
      }

      .action-btn {
        width: 48px;
        height: 48px;
        font-size: 22px;
      }

      .profile,
      .profile img {
        width: 52px;
        height: 52px;
      }

      .bottom-info {
        left: 16px;
        right: 76px;
        bottom: 110px;
      }

      .bottom-info .restaurant {
        font-size: 18px;
      }

      .bottom-info .description {
        font-size: 13px;
      }

      .order-btn {
        font-size: 18px;
        padding: 16px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="video-container">
    <video autoplay loop playsinline controls>
      <source src="demo-video.mp4" type="video/mp4" />
    </video>

    <div class="bottom-fade"></div>

    <!-- Top left brand -->
    <div class="logo-overlay">
      <img src="bbq-logo.png" alt="Real Smoq'ed BBQ logo" />
      <span>Real Smoq'ed BBQ</span>
    </div>

    <!-- Right side actions -->
    <div class="side-actions">

      <div class="profile">
        <img src="bbq-logo.png" alt="Real Smoq'ed BBQ profile" />
        <div class="follow">+</div>
      </div>

      <a href="#" class="action">
        <div class="action-btn">❤️</div>
        <div>1.2K</div>
      </a>

      <a href="#" class="action">
        <div class="action-btn">💬</div>
        <div>184</div>
      </a>

      <a href="#" class="action">
        <div class="action-btn">🔖</div>
        <div>Save</div>
      </a>

      <a href="#" class="action">
        <div class="action-btn">↗️</div>
        <div>Share</div>
      </a>
    </div>

    <!-- Bottom restaurant text -->
    <div class="bottom-info">
      <div class="restaurant">Real Smoq'ed BBQ</div>
      <div class="description">
        Slow-smoked BBQ, sauced ribs, and real comfort food.
      </div>
    </div>

    <!-- Order button -->
    <a
      href="https://realsmoqedbbq.com/menu"
      class="order-btn"
      target="_blank"
      rel="noopener noreferrer"
    >
      Order Now
    </a>

  </div>

</body>
