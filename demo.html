<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMF Demo</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bottom-fade {
      position: absolute;
      bottom: 0;
      height: 42%;
      width: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.78), rgba(0,0,0,0));
      z-index: 10;
      pointer-events: none;
    }

    /* Top-left brand pill */
    .logo-overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(70, 55, 55, 0.38);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .logo-overlay img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      object-fit: cover;
      object-position: center;
      transform: scale(1.22);
      display: block;
      box-shadow: 0 6px 16px rgba(0,0,0,0.45);
      flex-shrink: 0;
    }

    .logo-overlay span {
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      line-height: 1;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      white-space: nowrap;
    }

    /* Right-side TikTok actions */
    .side-actions {
      position: absolute;
      right: 12px;
      bottom: 122px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 20;
    }

    .profile {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      background: rgba(0,0,0,0.25);
    }

    .profile img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      object-position: center;
      transform: scale(1.35);
      display: block;
    }

    .follow {
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e01919;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }

    .action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      text-decoration: none;
    }

    .action-btn {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      line-height: 1;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    /* Bottom restaurant text */
    .bottom-info {
      position: absolute;
      left: 16px;
      right: 84px;
      bottom: 112px;
      color: #fff;
      z-index: 20;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    .bottom-info .restaurant {
      font-weight: 800;
      font-size: 19px;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .bottom-info .description {
      font-size: 13px;
      color: #e2e2e2;
      line-height: 1.45;
      max-width: 430px;
    }

    /* Order button */
    .order-btn {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: #d9342b;
      color: #fff;
      padding: 17px 20px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 18px;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(217, 52, 43, 0.45);
      z-index: 20;
    }

    @media (max-width: 600px) {
      .logo-overlay {
        top: 16px;
        left: 16px;
        padding: 9px 12px;
      }

      .logo-overlay img {
        width: 40px;
        height: 40px;
      }

      .logo-overlay span {
        font-size: 13px;
      }

      .side-actions {
        right: 10px;
        bottom: 120px;
        gap: 16px;
      }

      .profile {
        width: 54px;
        height: 54px;
      }

      .profile img {
        width: 54px;
        height: 54px;
      }

      .action-btn {
        width: 50px;
        height: 50px;
        font-size: 22px;
      }

      .bottom-info {
        left: 16px;
        right: 76px;
        bottom: 110px;
      }

      .bottom-info .restaurant {
        font-size: 18px;
      }

      .bottom-info .description {
        font-size: 13px;
      }

      .order-btn {
        font-size: 18px;
        padding: 16px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="video-container">
    <video autoplay muted loop playsinline>
      <source src="demo-video.mov" type="video/mp4" />
    </video>

    <div class="bottom-fade"></div>

    <div class="logo-overlay">
      <img src="bbq-logo.png" alt="Real Smoq'ed BBQ logo" />
      <span>Real Smoq'ed BBQ</span>
    </div>

    <div class="side-actions">
      <div class="profile">
        <img src="bbq-logo.png" alt="Real Smoq'ed BBQ profile" />
        <div class="follow">+</div>
      </div>

      <a href="#" class="action">
        <div class="action-btn">❤️</div>
        <div>1.2K</div>
      </a>

      <a href="#" class="action">
        <div class="action-btn">💬</div>
        <div>184</div>
      </a>

      <a href="#" class="action">
        <div class="action-btn">🔖</div>
        <div>Save</div>
      </a>

      <a href="#" class="action">
        <div class="action-btn">↗️</div>
        <div>Share</div>
      </a>
    </div>

    <div class="bottom-info">
      <div class="restaurant">Real Smoq'ed BBQ</div>
      <div class="description">
        Slow-smoked BBQ, sauced ribs, and real comfort food.
      </div>
    </div>

    <a
      href="https://realsmoqedbbq.com/menu"
      class="order-btn"
      target="_blank"
      rel="noopener noreferrer"
    >
      Order Now
    </a>
  </div>

</body>
</html>
