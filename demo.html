<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DMF Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .phone-frame {
      position: relative;
      width: 100%;
      max-width: 430px;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      background: #000;
    }

    video {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
    }

    .top-label {
      position: absolute;
      top: 16px;
      left: 20px;
      right: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      z-index: 3;
      text-shadow: 0 2px 8px rgba(0,0,0,.65);
    }

    .side-ui {
      position: absolute;
      right: 14px;
      bottom: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 3;
    }

    .logo-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid white;
      background: #111;
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .icon-block {
      text-align: center;
      font-size: 14px;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,.6);
    }

    .icon {
      font-size: 30px;
      line-height: 1;
      display: block;
      margin-bottom: 6px;
    }

    .order-wrap {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 18px;
      z-index: 3;
    }

    .order-btn {
      display: block;
      width: 100%;
      text-align: center;
      background: #e32020;
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 20px;
      padding: 16px 20px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,.35);
    }

    .meta-bar {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #ddd;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }

    .back {
      display: inline-block;
      margin: 18px auto 0;
      color: #aaa;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="video-wrap">
      <div class="top-label">Watch. Tap. Order.</div>

      <video controls playsinline>
        <source src="demo-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <div class="side-ui">
        <div class="logo-circle">
          <img src="phone-mockup.png" alt="Restaurant logo">
        </div>

        <div class="icon-block">
          <span class="icon">❤</span>
          128
        </div>

        <div class="icon-block">
          <span class="icon">💬</span>
          24
        </div>

        <div class="icon-block">
          <span class="icon">↗</span>
          Share
        </div>
      </div>

      <div class="order-wrap">
        <a href="https://realsmoqedbbq.com/menu" target="_blank" class="order-btn">ORDER NOW</a>
        <div class="meta-bar">
          <span>Direct from restaurant</span>
          <span>15–25 min</span>
          <span>Cleveland, OH</span>
        </div>
      </div>
    </div>

    <div style="text-align:center;">
      <a href="index.html" class="back">← Back</a>
    </div>
  </div>
</body>
</html>
