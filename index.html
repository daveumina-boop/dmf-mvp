<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>DMF — The DeliverMeFood App</title>
  <meta property="og:title" content="DMF — The DeliverMeFood App" />
  <meta property="og:description" content="Turn videos into direct orders. Watch. Tap. Order." />
  <meta property="og:image" content="phone-mockup.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://daveumina-boop.github.io/dmf-mvp/" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 60px;
    }

    h1 {
      font-size: 64px;
      line-height: 1.05;
      font-weight: 800;
      margin: 24px 0 20px;
      letter-spacing: -0.03em;
    }

    p.subtext {
      font-size: 28px;
      line-height: 1.45;
      color: #cfcfcf;
      margin: 0 auto 34px;
      max-width: 680px;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 34px;
    }

    .btn {
      display: inline-block;
      min-width: 230px;
      padding: 18px 26px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 22px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #e01919;
      color: #fff;
      border: 2px solid #e01919;
    }

    .btn-primary:hover {
      background: #f02121;
      border-color: #f02121;
    }

    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 2px solid #444;
    }

    .btn-secondary:hover {
      border-color: #777;
    }

    .hero-image {
      width: 100%;
      max-width: 690px;
      border-radius: 28px;
      display: block;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .container {
        padding: 34px 18px 48px;
      }

      h1 {
        font-size: 34px;
        margin-top: 8px;
        margin-bottom: 14px;
      }

      p.subtext {
        font-size: 18px;
        margin-bottom: 26px;
      }

      .button-row {
        gap: 14px;
        margin-bottom: 26px;
      }

      .btn {
        min-width: 0;
        width: calc(50% - 7px);
        padding: 16px 10px;
        font-size: 16px;
        border-radius: 10px;
      }

      .hero-image {
        border-radius: 22px;
      }
    }

    @media (max-width: 420px) {
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Turn videos into orders.</h1>

    <p class="subtext">
      Customers discover food through video and order directly from the restaurant.
    </p>

    <div class="button-row">
      <a href="/dmf-mvp/demo.html" class="btn btn-primary">Watch Demo</a>
      <a href="/dmf-mvp/restaurant.html" class="btn btn-secondary">Get More Info</a>
    </div>

    <img src="phone-mockup.png" alt="DMF phone mockup" class="hero-image" />
  </div>
</body>
