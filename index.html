<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>DMF — The DeliverMeFood App</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

      /* 🔥 THIS FIXES SCROLL FEEL */
      height: 100%;
      overflow-x: hidden;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px 40px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      line-height: 1.1;
      margin: 10px 0 14px;
    }

    .subtext {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 26px;
      line-height: 1.5;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .btn {
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #e01919;
      color: #fff;
    }

    .btn-secondary {
      border: 1px solid #444;
      color: #fff;
    }

    .hero-image {
      width: 100%;
      max-width: 500px;
      border-radius: 20px;
      margin: 0 auto;
      display: block;
    }

    /* 🔥 MOBILE FIX */
    @media (max-width: 500px) {
      .button-row {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Turn videos into orders.</h1>

  <p class="subtext">
    Customers discover food through video and order directly from the restaurant.
  </p>

  <div class="button-row">
    <!-- 🔥 FIXED LINKS -->
    <a href="./demo.html" class="btn btn-primary">Watch Demo</a>
    <a href="./restaurant.html" class="btn btn-secondary">Get More Info</a>
  </div>

  <img src="phone-mockup.png" class="hero-image" />

</div>

</body>
</html>
