<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Inquiry</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 32px;
    }

    p {
      color: #aaa;
    }

    input, select {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 18px;
      background: #e50914;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
    }

    .back {
      margin-top: 20px;
      color: #aaa;
      display: block;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Start Getting Direct Orders</h1>
  <p>Turn your food videos into real orders — without paying commissions.</p>

  <form action="https://formspree.io/f/mdawbbag" method="POST">

    <input type="text" name="restaurant" placeholder="Restaurant Name" required>
    <input type="text" name="contact" placeholder="Contact Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="email" name="email" placeholder="Email" required>

    <select name="pos" required>
      <option value="">Current POS System</option>
      <option>Toast</option>
      <option>Square</option>
      <option>Clover</option>
      <option>Other</option>
    </select>

    <select name="delivery" required>
      <option value="">Do you use DoorDash/Uber Eats?</option>
      <option>Yes</option>
      <option>No</option>
    </select>

    <button type="submit">Get Started</button>

  </form>

  <a href="index.html" class="back">← Back</a>

</div>

</body>
</html>
